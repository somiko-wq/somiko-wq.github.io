<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>봄날엔 광고 성과 요약</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 사용자님이 제공하신 기존 디자인 CSS를 여기에 그대로 붙여넣으세요. */
        /* (지면상 핵심 레이아웃 스타일만 유지합니다) */
        :root { --bg: #f8f7f4; --accent: #d4552a; --green: #2d7a4f; --text: #1a1714; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .page-header { background: var(--text); color: #fff; padding: 48px 0; text-align: center; }
        .roas-num { font-size: 72px; font-weight: 900; color: #ff9a6c; }
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 960px; margin: 20px auto; padding: 0 20px; }
        .kpi-card { background: #fff; border: 1px solid #e8e4de; padding: 20px; border-radius: 10px; }
        .kpi-value { font-size: 24px; font-weight: 700; }
        .section { max-width: 960px; margin: 0 auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; font-size: 12px; border-radius: 10px; overflow: hidden; }
        th { background: #f4f1ec; padding: 12px; text-align: left; border-bottom: 2px solid #e8e4de; }
        td { padding: 10px; border-bottom: 1px solid #f0ece6; }
        .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; font-weight: 700; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">데이터를 실시간으로 불러오는 중...</div>

<header class="page-header">
    <div class="header-eyebrow">봄날엔 · AD PERFORMANCE</div>
    <h1 class="header-title">봄날엔 광고 성과 요약</h1>
    <div class="header-roas">
        <span class="roas-num" id="main-roas">0%</span>
        <div style="color: rgba(255,255,255,0.5);">전체 평균 ROAS</div>
    </div>
</header>

<div class="kpi-grid">
    <div class="kpi-card"><div style="font-size:11px; color:#9a9390;">총 광고비</div><div class="kpi-value" id="kpi-spend">₩0</div></div>
    <div class="kpi-card"><div style="font-size:11px; color:#9a9390;">광고 매출</div><div class="kpi-value" id="kpi-revenue">₩0</div></div>
    <div class="kpi-card" style="background:#d4552a; color:#fff;"><div style="font-size:11px; color:rgba(255,255,255,0.7);">이익(50%)</div><div class="kpi-value" id="kpi-profit">₩0</div></div>
    <div class="kpi-card"><div style="font-size:11px; color:#9a9390;">구매 건수</div><div class="kpi-value" id="kpi-purchases">0건</div></div>
    <div class="kpi-card"><div style="font-size:11px; color:#9a9390;">평균 CPS</div><div class="kpi-value" id="kpi-cps">₩0</div></div>
</div>

<div class="section">
    <div style="font-weight: 700; margin-bottom: 15px; letter-spacing: 1px;">📊 상세 성과 내역</div>
    <table>
        <thead>
            <tr>
                <th>소재명</th>
                <th>플랫폼</th>
                <th>지출</th>
                <th>매출</th>
                <th>ROAS</th>
                <th>CPS</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script>
/**
 * 1. 구글 시트 링크 변환
 * 공유 링크 끝의 /edit... 부분을 /export?format=csv로 바꾸면 API 없이도 데이터를 읽을 수 있습니다.
 */
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1eXQVqu9qdzJyMRQl380teciChzG845OoUFyvA5xg9Qk/export?format=csv&gid=0';

async function loadDashboard() {
    try {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();
        
        // CSV 파싱 (단순 쉼표 분리 방식)
        const rows = csvText.split('\n').map(row => row.split(','));
        const data = rows.slice(1).filter(r => r.length > 1); // 헤더 제외

        // 데이터 계산 변수 (제공된 엑셀 컬럼 기준: Index 9=spend, 8=revenue, 7=purchases)
        let totalSpend = 0, totalRev = 0, totalPur = 0;
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = '';

        data.forEach(row => {
            const spend = parseFloat(row[9]) || 0;
            const rev = parseFloat(row[8]) || 0;
            const pur = parseFloat(row[7]) || 0;
            const platform = row[1] ? row[1].trim() : '-';
            const name = row[4] ? row[4].trim() : '이름 없음';

            totalSpend += spend;
            totalRev += rev;
            totalPur += pur;

            // 상세 테이블 행 추가
            const roas = spend > 0 ? ((rev / spend) * 100).toFixed(0) : 0;
            const cps = pur > 0 ? Math.round(spend / pur).toLocaleString() : '-';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:500;">${name}</td>
                <td><span style="font-size:10px; padding:2px 6px; background:#eee; border-radius:4px;">${platform.toUpperCase()}</span></td>
                <td>₩${Math.round(spend).toLocaleString()}</td>
                <td>₩${Math.round(rev).toLocaleString()}</td>
                <td style="font-weight:700; color:${roas >= 400 ? '#2d7a4f' : '#d4552a'}">${roas}%</td>
                <td>₩${cps}</td>
            `;
            tableBody.appendChild(tr);
        });

        // KPI 업데이트
        const totalRoas = totalSpend > 0 ? ((totalRev / totalSpend) * 100).toFixed(0) : 0;
        document.getElementById('main-roas').innerText = totalRoas + '%';
        document.getElementById('kpi-spend').innerText = '₩' + Math.round(totalSpend / 10000).toLocaleString() + '만';
        document.getElementById('kpi-revenue').innerText = '₩' + Math.round(totalRev / 10000).toLocaleString() + '만';
        document.getElementById('kpi-profit').innerText = '₩' + Math.round((totalRev * 0.5) / 10000).toLocaleString() + '만';
        document.getElementById('kpi-purchases').innerText = totalPur.toLocaleString() + '건';
        document.getElementById('kpi-cps').innerText = '₩' + (totalPur > 0 ? Math.round(totalSpend / totalPur).toLocaleString() : '0');

        document.getElementById('loader').style.display = 'none';

    } catch (error) {
        console.error("Data Load Error:", error);
        document.getElementById('loader').innerText = "데이터 로드 실패. 링크 권한을 확인하세요.";
    }
}

window.onload = loadDashboard;
</script>
</body>
</html>
