<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날엔 · 1월 광고 성과 요약</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
/* 원본 CSS 코드 (절대 수정 안함) */
/* ... (사용자님이 주신 CSS 전체가 여기에 들어있다고 가정합니다) ... */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f8f7f4; --surface: #ffffff; --border: #e8e4de; --border-light: #f0ece6; --text: #1a1714; --text-mid: #5a5550; --text-light: #9a9390; --accent: #d4552a; --accent-light: #fdf0eb; --green: #2d7a4f; --green-bg: #eaf4ee; --yellow: #c8880a; --yellow-bg: #fef9ee; --red: #c0392b; --red-bg: #fdf0ef; --blue: #2563a8; --blue-bg: #eef3fb; --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,0.07); --shadow-md: 0 4px 24px rgba(0,0,0,0.10); }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
.page-header { background: var(--text); color: #fff; padding: 48px 0 40px; position: relative; overflow: hidden; }
.page-header-inner { max-width: 960px; margin: 0 auto; padding: 0 20px; }
.header-title { font-family: 'Noto Serif KR', serif; font-size: 36px; font-weight: 700; line-height: 1.15; margin-bottom: 6px; }
.header-title em { font-style: normal; color: #ff9a6c; }
.roas-num { font-size: 72px; font-weight: 900; line-height: 1; color: #ff9a6c; letter-spacing: -2px; }
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px; box-shadow: var(--shadow); }
.kpi-card.accent { background: var(--accent); border-color: var(--accent); color: white; }
.kpi-value { font-size: 24px; font-weight: 700; line-height: 1; }
/* ... (이하 원본 CSS 유지) ... */
</style>
</head>
<body>

<header class="page-header">
  <div class="page-header-inner">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">봄날엔 · 인스타그램 Meta Ads</div>
        <h1 class="header-title">봄날엔 · <em>1월</em> 광고 성과 요약</h1>
        <p class="header-sub">2026.01.01 – 01.31 &nbsp;·&nbsp; 인스타그램 Meta Ads &nbsp;·&nbsp; 캠페인 3개</p>
        <div class="header-roas">
          <span class="roas-num" id="live-main-roas">684%</span> <span class="roas-label">1월 전체 ROAS</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="kpi-section">
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">총 광고비</div>
      <div class="kpi-value" id="live-total-spend">139.8만원</div> </div>
    <div class="kpi-card">
      <div class="kpi-label">광고 매출</div>
      <div class="kpi-value" id="live-total-revenue">783.7만원</div> </div>
    <div class="kpi-card accent">
      <div class="kpi-label">광고 이익 (×50%)</div>
      <div class="kpi-value" id="live-total-profit">391.8만원</div> </div>
    <div class="kpi-card">
      <div class="kpi-label">광고 순이익</div>
      <div class="kpi-value green" id="live-net-profit">+277.3만원</div> </div>
    <div class="kpi-card">
      <div class="kpi-label">평균 CPS (구매전환당)</div>
      <div class="kpi-value green" id="live-avg-cps" style="font-size:22px;">₩5,378</div> </div>
  </div>
</div>

<script>
/**
 * 연동 로직: 사용자 원본 디자인을 해치지 않기 위해 
 * 데이터 로드 후 지정된 ID의 텍스트만 교체합니다.
 */
const DATA_URL = 'https://docs.google.com/spreadsheets/d/1eXQVqu9qdzJyMRQl380teciChzG845OoUFyvA5xg9Qk/export?format=csv&gid=0';

async function syncData() {
  try {
    const res = await fetch(DATA_URL);
    const csv = await res.text();
    const rows = csv.split('\n').map(r => r.split(','));
    const data = rows.slice(1).filter(r => r.length > 1);

    let tSpend = 0, tRev = 0, tPur = 0;
    
    data.forEach(row => {
      // 업로드해주신 파일 컬럼 기준: Index 9(spend), 8(revenue), 7(purchases)
      tSpend += parseFloat(row[9]) || 0;
      tRev += parseFloat(row[8]) || 0;
      tPur += parseInt(row[7]) || 0;
    });

    // 계산 및 화면 주입
    const roas = tSpend > 0 ? ((tRev / tSpend) * 100).toFixed(0) : 0;
    const profit = tRev * 0.5;
    const net = profit - tSpend;
    const cps = tPur > 0 ? Math.round(tSpend / tPur) : 0;

    // 사용자 디자인 텍스트만 변경
    document.getElementById('live-main-roas').innerText = roas + '%';
    document.getElementById('live-total-spend').innerText = (tSpend / 10000).toFixed(1) + '만원';
    document.getElementById('live-total-revenue').innerText = (tRev / 10000).toFixed(1) + '만원';
    document.getElementById('live-total-profit').innerText = (profit / 10000).toFixed(1) + '만원';
    document.getElementById('live-net-profit').innerText = (net >= 0 ? '+' : '') + (net / 10000).toFixed(1) + '만원';
    document.getElementById('live-avg-cps').innerText = '₩' + cps.toLocaleString();

  } catch (e) {
    console.error("데이터 동기화 실패", e);
  }
}

window.onload = syncData;
</script>
</body>
</html>
