<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날엔 캠퍼스 어택 🚚🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* [디자인 CSS - 원본 유지] */
  :root {
    --pink: #FF6B9D; --pink-light: #FFB3CE; --pink-pale: #FFF0F6;
    --yellow: #FFD93D; --yellow-light: #FFF3B0; --coral: #FF8C69;
    --white: #FFFFFF; --dark: #3D2C35; --gray: #8A7A82;
    --gray-light: #F9F0F4; --shadow: 0 4px 20px rgba(255,107,157,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #FFF0F6 0%, #FFF8E7 50%, #FFF0F6 100%);
    color: var(--dark); min-height: 100vh; overflow-x: hidden;
  }
  .deco-float { position: fixed; pointer-events: none; z-index: 0; font-size: 28px; opacity: 0.18; animation: floatDeco 6s ease-in-out infinite; }
  @keyframes floatDeco { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-18px) rotate(5deg); } }
  .hero { position: relative; background: linear-gradient(160deg, #FF6B9D 0%, #FF8C69 55%, #FFD93D 100%); padding: 44px 20px 52px; text-align: center; overflow: hidden; z-index: 1; }
  .hero-badge-top { display: inline-block; background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.45); color: rgba(255,255,255,0.95); font-size: 12px; font-weight: 700; padding: 5px 16px; border-radius: 999px; margin-bottom: 20px; }
  .hero-campus-attack { display: block; font-size: clamp(44px, 13vw, 76px); font-weight: 900; line-height: 1.0; letter-spacing: -2px; background: linear-gradient(160deg, #ffffff 0%, #ffffff 50%, #FFE566 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 16px rgba(80,20,40,0.28)); }
  .container { max-width: 480px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }
  .section { margin: 24px 0; }
  .card { background: var(--white); border-radius: 20px; padding: 24px 20px; box-shadow: var(--shadow); border: 2px solid rgba(255,107,157,0.08); }
  .school-search-wrap { position: relative; margin-top: 12px; }
  .school-input, .text-input { width: 100%; padding: 14px 18px; border: 2px solid var(--pink-light); border-radius: 14px; font-size: 15px; background: var(--pink-pale); outline: none; }
  .school-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 2px solid var(--pink-light); border-radius: 14px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; }
  .school-dropdown.show { display: block; }
  .school-option { padding: 12px 18px; font-size: 14px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); }
  .selected-school { display: none; align-items: center; gap: 10px; padding: 12px 16px; background: #FFF3B0; border-radius: 12px; margin-top: 8px; font-weight: 700; }
  .selected-school.show { display: flex; }
  .vote-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--pink), var(--coral)); color: #fff; font-size: 18px; font-weight: 900; border: none; border-radius: 16px; cursor: pointer; margin-top: 20px; }
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin: 24px 0; }
  .podium-item { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .podium-block { width: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; border-radius: 12px 12px 0 0; }
  .p1 .podium-block { height: 80px; background: var(--yellow); }
  .p2 .podium-block { height: 60px; background: var(--pink-light); }
  .p3 .podium-block { height: 45px; background: var(--coral); }
  .rank-item { display: flex; justify-content: space-between; padding: 12px; background: #fff; margin-bottom: 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge-top">🏆 대학 대항전</div>
  <span class="hero-campus-attack">캠퍼스 어택</span>
</div>

<div class="container">
  <div class="section">
    <div class="card">
      <div class="school-search-wrap">
        <input type="text" class="school-input" id="schoolInput" placeholder="학교명을 검색하세요" autocomplete="off">
        <div class="school-dropdown" id="schoolDropdown"></div>
      </div>
      <div class="selected-school" id="selectedSchoolBox">🏫 <span id="selectedSchoolName"></span></div>
      <input type="text" class="text-input" id="nameInput" placeholder="이름" style="margin-top:10px;">
      <input type="tel" class="text-input" id="phoneInput" placeholder="전화번호" style="margin-top:10px;">
      <button class="vote-btn" id="voteBtn" onclick="submitVote()">🌸 투표하기</button>
    </div>
  </div>

  <div class="section">
    <div style="font-weight:900; color:var(--pink); margin-bottom:10px;">👑 실시간 순위</div>
    <div class="podium" id="podium">
      <p style="color:var(--gray); font-size:14px;">순위를 불러오는 중...</p>
    </div>
    <div id="rankList"></div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx6QID9VYlvuVoyeDg27TvPGLppz15jprauTOpBBLZbjsIYR6zSq_do6KKbXxVwbVr8/exec";

// 학교 명단 (축약본 예시 - 원본 명단 유지 필요)
const UNIVERSITIES = ["가천대학교", "건국대학교", "서울대학교", "연세대학교", "고려대학교"]; 

let voteData = {};
let selectedSchool = '';

// 데이터 로드 함수 (Redirect 대응을 위해 수정)
async function fetchSheetData() {
    try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        voteData = data;
        renderRanking();
    } catch (e) {
        console.error("Error:", e);
        document.getElementById('podium').innerHTML = "<p style='font-size:12px; color:red;'>순위 데이터를 불러오지 못했습니다. (권한 설정 확인 필요)</p>";
    }
}

async function submitVote() {
    const name = document.getElementById('nameInput').value.trim();
    const phone = document.getElementById('phoneInput').value.trim();
    if(!selectedSchool || !name || !phone) return alert("정보를 모두 입력하세요!");

    const btn = document.getElementById('voteBtn');
    btn.disabled = true; btn.textContent = "전송 중...";

    try {
        // GET 방식으로 전송 (CORS 문제를 피하기 위한 가장 안정적인 방법)
        const queryUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&school=${encodeURIComponent(selectedSchool)}&phone=${encodeURIComponent(phone)}`;
        
        // 투표 시 웹앱이 Redirect를 하므로 mode: 'no-cors'를 고려할 수 있으나, 
        // 앱스 스크립트 배포가 올바르다면 일반 fetch로 가능합니다.
        await fetch(queryUrl, { method: 'GET' });
        
        alert("투표가 완료되었습니다!");
        location.reload();
    } catch (e) {
        console.error(e);
        alert("기록에 실패했습니다. 구글 앱스 스크립트 배포 설정을 확인하세요.");
        btn.disabled = false;
    }
}

function renderRanking() {
    const sorted = Object.entries(voteData).sort((a,b) => b[1] - a[1]);
    const podium = document.getElementById('podium');
    const list = document.getElementById('rankList');
    
    if(sorted.length === 0) {
        podium.innerHTML = "<p>아직 투표가 없습니다!</p>";
        return;
    }

    // 단상 (1, 2, 3위)
    podium.innerHTML = `
        <div class="podium-item p2"><div style="font-size:11px;">${sorted[1]?.[0] || '-'}</div><div class="podium-block">🥈</div></div>
        <div class="podium-item p1"><div style="font-size:12px; font-weight:bold;">${sorted[0]?.[0] || '-'}</div><div class="podium-block">🥇</div></div>
        <div class="podium-item p3"><div style="font-size:11px;">${sorted[2]?.[0] || '-'}</div><div class="podium-block">🥉</div></div>
    `;

    // 리스트
    list.innerHTML = sorted.map((item, i) => `
        <div class="rank-item">
            <span>${i+1}. ${item[0]}</span>
            <span style="font-weight:bold; color:var(--pink);">${item[1]}표</span>
        </div>
    `).join('');
}

// 자동완성 로직 (생략 - 기존 코드 그대로 사용)
const sInput = document.getElementById('schoolInput');
const sDrop = document.getElementById('schoolDropdown');
sInput.addEventListener('input', () => {
    const val = sInput.value.trim();
    if(!val) return sDrop.classList.remove('show');
    const filtered = UNIVERSITIES.filter(u => u.includes(val)).slice(0, 10);
    sDrop.innerHTML = filtered.map(u => `<div class="school-option" onclick="setSchool('${u}')">${u}</div>`).join('');
    sDrop.classList.add('show');
});
function setSchool(u) {
    selectedSchool = u; sInput.value = ''; sDrop.classList.remove('show');
    document.getElementById('selectedSchoolName').textContent = u;
    document.getElementById('selectedSchoolBox').classList.add('show');
}

window.onload = fetchSheetData;
</script>
</body>
</html>
