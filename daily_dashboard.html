<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ─── 사용자 제공 디자인 CSS (전체 유지) ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --border: #e8e4de;
  --border-light: #f0ece6;
  --text: #1a1714;
  --text-mid: #5a5550;
  --text-light: #9a9390;
  --accent: #d4552a;
  --accent-light: #fdf0eb;
  --green: #2d7a4f;
  --green-bg: #eaf4ee;
  --yellow: #c8880a;
  --yellow-bg: #fef9ee;
  --red: #c0392b;
  --red-bg: #fdf0ef;
  --blue: #2563a8;
  --blue-bg: #eef3fb;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.page-header {
  background: var(--text);
  color: #fff;
  padding: 48px 0 40px;
  position: relative;
  overflow: hidden;
}
.page-header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px;
}
.page-header::before {
  content: '';
  position: absolute;
  right: -60px; top: -60px;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.header-eyebrow {
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.header-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 36px;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 6px;
}
.header-title em {
  font-style: normal;
  color: #ff9a6c;
}
.header-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 36px;
}
.header-roas {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
}
.roas-num {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: #ff9a6c;
  letter-spacing: -2px;
}
.roas-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  letter-spacing: 1px;
}
.header-caption {
  margin-top: 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
}

.container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

.kpi-section { padding: 32px 20px 0; max-width: 960px; margin: 0 auto; }
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  box-shadow: var(--shadow);
}
.kpi-card.accent { background: var(--accent); border-color: var(--accent); color: white; }
.kpi-label { font-size: 11px; color: var(--text-light); margin-bottom: 8px; letter-spacing: 0.5px; line-height: 1.4; }
.kpi-card.accent .kpi-label { color: rgba(255,255,255,0.65); }
.kpi-value { font-size: 24px; font-weight: 700; line-height: 1; color: var(--text); }
.kpi-card.accent .kpi-value { color: #fff; }
.kpi-value.green { color: var(--green); }
.kpi-sub { font-size: 11px; color: var(--text-light); margin-top: 5px; }
.kpi-card.accent .kpi-sub { color: rgba(255,255,255,0.55); }

.section { max-width: 960px; margin: 0 auto; padding: 28px 20px 0; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-inner { padding: 20px; }
.card-title {
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-light); margin-bottom: 16px;
}

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: #f4f1ec; border-bottom: 2px solid var(--border); }
thead th {
  padding: 10px 12px; text-align: left; font-size: 11px;
  font-weight: 700; color: var(--text-mid); letter-spacing: 0.5px; white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border-light); }
tbody td { padding: 10px 12px; color: var(--text-mid); white-space: nowrap; }
tbody td:first-child { color: var(--text); font-weight: 500; }

.roas-pill {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
}
.roas-hi { background: var(--green-bg); color: var(--green); }
.roas-lo { background: var(--red-bg); color: var(--red); }

/* 로딩 오버레이 */
#loading-overlay {
  position: fixed; inset: 0; background: #fff; z-index: 9999;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  font-weight: 700; color: var(--accent);
}
</style>
</head>
<body>

<div id="loading-overlay">데이터를 실시간으로 연결 중입니다...</div>

<header class="page-header">
  <div class="page-header-inner">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">봄날엔 · 인스타그램 Meta Ads</div>
        <h1 class="header-title">봄날엔 · <em>실시간</em> 광고 성과</h1>
        <p class="header-sub" id="date-range">기간 로딩 중...</p>
        <div class="header-roas">
          <span class="roas-num" id="total-roas">0%</span>
          <span class="roas-label">전체 평균 ROAS</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="kpi-section">
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">총 광고비</div>
      <div class="kpi-value" id="total-spend">₩0</div>
      <div class="kpi-sub">실시간 집행액</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">광고 매출</div>
      <div class="kpi-value" id="total-revenue">₩0</div>
      <div class="kpi-sub" id="total-purchases">0건 전환</div>
    </div>
    <div class="kpi-card accent">
      <div class="kpi-label">광고 이익 (×50%)</div>
      <div class="kpi-value" id="total-profit">₩0</div>
      <div class="kpi-sub">이익률 50% 기준</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">광고 순이익</div>
      <div class="kpi-value green" id="net-profit">₩0</div>
      <div class="kpi-sub">이익 - 광고비</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">평균 CPS</div>
      <div class="kpi-value" id="avg-cps">₩0</div>
      <div class="kpi-sub">전환당 비용</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="card">
    <div class="card-inner">
      <div class="card-title">📊 소재별 상세 성과 내역</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>소재명</th>
              <th>플랫폼</th>
              <th>지출</th>
              <th>매출</th>
              <th>ROAS</th>
              <th>전환수</th>
              <th>CPS</th>
            </tr>
          </thead>
          <tbody id="data-table-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
/**
 * 1. 구글 시트 링크 데이터 추출용 변환
 * 공유된 edit 링크를 export?format=csv 형식으로 변경하여 호출합니다.
 */
const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1eXQVqu9qdzJyMRQl380teciChzG845OoUFyvA5xg9Qk/export?format=csv&gid=0';

async function fetchDashboardData() {
  try {
    const response = await fetch(GOOGLE_SHEET_URL);
    if (!response.ok) throw new Error('네트워크 응답에 문제가 있습니다.');
    
    const csvData = await response.text();
    const rows = csvData.split('\n').map(row => row.split(','));
    
    // 첫 줄(헤더)을 제외한 데이터 행 추출
    const dataRows = rows.slice(1).filter(row => row.length > 1);

    let totalSpend = 0;
    let totalRevenue = 0;
    let totalPurchases = 0;
    let dates = [];

    const tableBody = document.getElementById('data-table-body');
    tableBody.innerHTML = '';

    dataRows.forEach(row => {
      // 업로드한 CSV 컬럼 구조 기준 (Index): 
      // 1: platform, 4: adname, 7: purchases, 8: revenue, 9: spend, 0: date
      const platform = row[1]?.trim().toUpperCase() || '-';
      const adName = row[4]?.trim() || '이름 없음';
      const purchases = parseInt(row[7]) || 0;
      const revenue = parseFloat(row[8]) || 0;
      const spend = parseFloat(row[9]) || 0;
      const date = row[0]?.trim();

      totalSpend += spend;
      totalRevenue += revenue;
      totalPurchases += purchases;
      if (date) dates.push(date);

      // 테이블 행 생성
      const roas = spend > 0 ? ((revenue / spend) * 100).toFixed(0) : 0;
      const cps = purchases > 0 ? Math.round(spend / purchases).toLocaleString() : '-';
      
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${adName}</td>
        <td><span style="font-size:10px; padding:2px 6px; background:#eee; border-radius:4px;">${platform}</span></td>
        <td>₩${Math.round(spend).toLocaleString()}</td>
        <td>₩${Math.round(revenue).toLocaleString()}</td>
        <td><span class="roas-pill ${roas >= 400 ? 'roas-hi' : 'roas-lo'}">${roas}%</span></td>
        <td>${purchases}건</td>
        <td>₩${cps}</td>
      `;
      tableBody.appendChild(tr);
    });

    // 상단 KPI 수치 업데이트
    const totalRoas = totalSpend > 0 ? ((totalRevenue / totalSpend) * 100).toFixed(0) : 0;
    const totalProfit = totalRevenue * 0.5;
    const netProfit = totalProfit - totalSpend;
    const avgCps = totalPurchases > 0 ? Math.round(totalSpend / totalPurchases) : 0;

    document.getElementById('total-roas').innerText = totalRoas + '%';
    document.getElementById('total-spend').innerText = '₩' + Math.round(totalSpend).toLocaleString();
    document.getElementById('total-revenue').innerText = '₩' + Math.round(totalRevenue).toLocaleString();
    document.getElementById('total-purchases').innerText = totalPurchases.toLocaleString() + '건 전환';
    document.getElementById('total-profit').innerText = '₩' + Math.round(totalProfit).toLocaleString();
    document.getElementById('net-profit').innerText = '₩' + Math.round(netProfit).toLocaleString();
    document.getElementById('avg-cps').innerText = '₩' + avgCps.toLocaleString();
    
    // 날짜 범위 표시
    if (dates.length > 0) {
      const sortedDates = dates.sort();
      document.getElementById('date-range').innerText = `${sortedDates[0]} – ${sortedDates[sortedDates.length-1]}`;
    }

    // 로딩 화면 제거
    document.getElementById('loading-overlay').style.display = 'none';

  } catch (error) {
    console.error('데이터 로드 실패:', error);
    document.getElementById('loading-overlay').innerText = '데이터를 불러오지 못했습니다. 공유 설정을 확인해주세요.';
  }
}

// 페이지 로드 시 실행
window.onload = fetchDashboardData;
</script>
</body>
</html>
