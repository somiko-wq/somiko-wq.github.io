let voteData = {};
let selectedSchool = '';

// 초기 실행: 구글 시트에서 실시간 랭킹 로드
async function init() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    voteData = data;
    renderRanking();
    document.getElementById('totalNum').textContent = Object.values(voteData).reduce((a, b) => a + b, 0).toLocaleString();
  } catch (e) { console.error("Data Load Error:", e); }
}

// 투표하기: 구글 시트로 POST 전송
async function submitVote() {
  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  if(!selectedSchool || !name || !phone) return alert("정보를 모두 입력해주세요! 😊");

  const btn = document.getElementById('voteBtn');
  btn.disabled = true; btn.textContent = "투표 중...";

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ name, school: selectedSchool, phone })
    });
    document.getElementById('modalDesc').textContent = selectedSchool + "에 소중한 한 표가 기록되었습니다!";
    document.getElementById('modalOverlay').classList.add('show');
  } catch (e) {
    alert("오류가 발생했습니다. 다시 시도해주세요.");
    btn.disabled = false; btn.textContent = "🌸 투표하기";
  }
}

// 랭킹 렌더링 (원본 디자인 기반)
function renderRanking() {
  const sorted = Object.entries(voteData).sort((a, b) => b[1] - a[1]);
  const podium = document.getElementById('podium');
  const list = document.getElementById('rankList');

  // 단상 (1, 2, 3위)
  let pHTML = '';
  const orders = [1, 0, 2]; // 2위, 1위, 3위 배치
  orders.forEach((idx, i) => {
    const item = sorted[idx];
    const pClass = i === 0 ? 'p2' : (i === 1 ? 'p1' : 'p3');
    const medal = idx === 0 ? '🥇' : (idx === 1 ? '🥈' : '🥉');
    if (item) {
      pHTML += `<div class="podium-item ${pClass}"><div class="podium-school">${item[0]}</div><div class="podium-block">${medal}</div></div>`;
    } else {
      pHTML += `<div class="podium-item ${pClass}"><div class="podium-school">-</div><div class="podium-block" style="opacity:0.3">-</div></div>`;
    }
  });
  podium.innerHTML = pHTML;

  // 순위 리스트
  list.innerHTML = sorted.map((item, i) => `
    <div class="rank-item">
      <div class="rank-num">${i + 1}</div>
      <div class="rank-school">${item[0]}</div>
      <div class="rank-votes">${item[1].toLocaleString()}표</div>
    </div>`).join('');
}

// 학교 검색 (원본 로직)
const sInput = document.getElementById('schoolInput');
const sDrop = document.getElementById('schoolDropdown');
sInput.addEventListener('input', () => {
  const val = sInput.value.trim();
  if (!val) return sDrop.classList.remove('show');
  const filtered = UNIVERSITIES.filter(u => u.includes(val)).slice(0, 10);
  sDrop.innerHTML = filtered.map(u => `<div class="school-option" onclick="setSchool('${u}')">${u}</div>`).join('');
  sDrop.classList.add('show');
});
function setSchool(u) {
  selectedSchool = u; sInput.value = ''; sDrop.classList.remove('show');
  document.getElementById('selectedSchoolName').textContent = u;
  document.getElementById('selectedSchoolBox').classList.add('show');
}
function clearSchool() {
  selectedSchool = ''; document.getElementById('selectedSchoolBox').classList.remove('show');
}
document.addEventListener('click', (e) => { if (!e.target.closest('.school-search-wrap')) sDrop.classList.remove('show'); });

init();
</script>
